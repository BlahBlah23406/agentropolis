<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentropolis City Builder</title>
<style>
  :root {
    --bg: #070b14;
    --panel: rgba(13, 20, 36, .84);
    --panel-2: rgba(22, 32, 56, .92);
    --line: rgba(120, 160, 255, .16);
    --line-strong: rgba(120, 160, 255, .34);
    --text: #e6eeff;
    --muted: #8ea4cc;
    --accent: #4f8ef7;
    --accent-2: #56c8ff;
    --gold: #f5c542;
    --danger: #e5484d;
    --ok: #46d68c;
    --r-md: 14px; --r-lg: 20px;
    --font: 500 14px/1.5 "Segoe UI", "Inter", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: var(--font); min-height: 100vh; }
  #app { max-width: 1200px; margin: 0 auto; padding: 20px; }

  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  /* Layout */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--r-lg);
    padding: 18px; -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); }
  .panel h2 { font-size: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .panel h2 .ic { color: var(--accent-2); }

  /* Building palette */
  .palette { display: flex; flex-wrap: wrap; gap: 10px; }
  .b-card { background: rgba(22, 32, 56, .6); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 12px; width: calc(33% - 7px); cursor: pointer; transition: border-color .2s, transform .15s; }
  .b-card:hover { border-color: var(--accent-2); transform: translateY(-2px); }
  .b-card .emoji { font-size: 24px; }
  .b-card .name { font-weight: 700; font-size: 13px; margin-top: 4px; }
  .b-card .desc { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.3; }
  .b-card .cat { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--accent);
    margin-top: 6px; font-weight: 800; }

  /* City view */
  #cityCanvas { width: 100%; height: 300px; background: rgba(7,11,20,.6); border-radius: var(--r-md);
    border: 1px solid var(--line); }
  .city-buildings { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .city-b { background: rgba(22, 32, 56, .6); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .city-b .emoji { font-size: 18px; }
  .city-b .conn { font-size: 10px; color: var(--ok); }

  /* Mission console */
  #missionForm { display: flex; gap: 8px; margin-bottom: 12px; }
  #missionText { flex: 1; border: 1px solid var(--line-strong); border-radius: var(--r-md);
    padding: 10px 14px; background: rgba(7,11,20,.6); color: var(--text); font: inherit; }
  #missionText:focus { outline: none; border-color: var(--gold); }
  #issueBtn { background: linear-gradient(180deg, #ffd75e, #e0a92e); color: #241a02; border: 0;
    border-radius: var(--r-md); padding: 10px 18px; font-weight: 800; cursor: pointer; }
  #issueBtn:disabled { filter: grayscale(.7); cursor: wait; }

  .run-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  #runBtn { background: var(--accent); color: #fff; border: 0; border-radius: var(--r-md);
    padding: 8px 16px; font-weight: 700; cursor: pointer; }
  #runBtn:disabled { opacity: .5; cursor: wait; }
  #runSeconds { width: 60px; border: 1px solid var(--line-strong); border-radius: var(--r-md);
    padding: 6px 8px; background: rgba(7,11,20,.6); color: var(--text); font: inherit; }

  /* Event feed */
  #eventFeed { max-height: 300px; overflow-y: auto; }
  .event { padding: 6px 8px; font-size: 12px; border-bottom: 1px solid rgba(120,160,255,.06); }
  .event .t { color: #5d729c; font-size: 11px; margin-right: 8px; }
  .event.order { color: var(--gold); }
  .event.deliver { color: var(--ok); }
  .event.plan { color: var(--accent-2); }

  /* Stats */
  .stats { display: flex; gap: 16px; font-size: 13px; font-weight: 700; }
  .stats .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }

  /* Results */
  .results { margin-top: 12px; }
  .result { background: rgba(22, 32, 56, .4); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 12px; margin-bottom: 8px; font-size: 12px; }
  .result .order { font-weight: 700; color: var(--gold); }
  .result .output { color: var(--muted); margin-top: 4px; }

  /* Connections panel */
  .conn-list { display: flex; flex-direction: column; gap: 8px; }
  .conn-item { background: rgba(22, 32, 56, .4); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 12px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .conn-item .type { font-weight: 700; }
  .conn-item .status { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-weight: 800; }
  .conn-item .status.ok { color: var(--ok); border: 1px solid rgba(70,214,140,.3); }
  .conn-item .status.unknown { color: var(--muted); border: 1px solid var(--line); }

  /* Buttons */
  .btn { background: rgba(120,160,255,.08); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 8px 14px; color: var(--text); cursor: pointer; font: inherit; font-weight: 600; }
  .btn:hover { border-color: var(--accent-2); }

  /* Toast */
  #toasts { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 100;
    display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--panel-2); border: 1px solid var(--line); border-radius: 999px;
    padding: 8px 16px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 28px rgba(2,6,16,.5); }
  .toast.err { border-color: rgba(229,72,77,.5); color: #ffb3b6; background: rgba(64,18,20,.92); }
  .toast.ok { border-color: rgba(70,214,140,.5); color: #b3f5d4; }

  /* JSON editor */
  #cityJsonEditor { width: 100%; height: 200px; background: rgba(7,11,20,.6); border: 1px solid var(--line);
    border-radius: var(--r-md); color: var(--text); font: 12px monospace; padding: 10px; resize: vertical; }
  #loadJsonBtn { margin-top: 8px; }
</style>
</head>
<body>
<div id="app">
  <h1>🌆 Agentropolis City Builder</h1>
  <div class="subtitle">Design a city of AI agent buildings, connect them to outside services, run missions.</div>

  <div class="grid">
    <!-- Building palette -->
    <div class="panel">
      <h2><span class="ic">🏗️</span> Pre-Made Buildings</h2>
      <div class="palette" id="palette"></div>
    </div>

    <!-- Connections registry -->
    <div class="panel">
      <h2><span class="ic">🔌</span> Outside Connections</h2>
      <div class="conn-list" id="connList"></div>
    </div>
  </div>

  <div class="grid">
    <!-- City view -->
    <div class="panel">
      <h2><span class="ic">🗺️</span> Your City</h2>
      <canvas id="cityCanvas" width="1200" height="600"></canvas>
      <div class="city-buildings" id="cityBuildings"></div>
      <div style="margin-top: 12px;">
        <button class="btn" id="loadDefaultBtn">Load Default City</button>
      </div>
    </div>

    <!-- Mission console -->
    <div class="panel">
      <h2><span class="ic">📡</span> Mission Console</h2>
      <form id="missionForm">
        <input id="missionText" placeholder="Describe a mission..." />
        <button id="issueBtn" type="submit">Issue</button>
      </form>
      <div class="run-bar">
        <button id="runBtn" class="btn">▶ Run Sim</button>
        <input id="runSeconds" type="number" value="30" min="5" max="120" />
        <span style="color: var(--muted); font-size: 12px;">seconds</span>
      </div>
      <div class="stats" id="stats"></div>
      <div class="results" id="results"></div>
    </div>
  </div>

  <div class="grid">
    <!-- Event feed -->
    <div class="panel">
      <h2><span class="ic">📡</span> Event Feed</h2>
      <div id="eventFeed"></div>
    </div>

    <!-- City JSON editor -->
    <div class="panel">
      <h2><span class="ic">📝</span> City Config (JSON)</h2>
      <textarea id="cityJsonEditor"></textarea>
      <button class="btn" id="loadJsonBtn">Load from JSON</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script type="module">
const API = '';

// --- Toast ---
function toast(msg, kind = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + kind;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// --- Load templates ---
async function loadTemplates() {
  const res = await fetch(`${API}/api/templates`);
  const { templates } = await res.json();
  const pal = document.getElementById('palette');
  pal.innerHTML = '';
  for (const t of templates) {
    const card = document.createElement('div');
    card.className = 'b-card';
    card.innerHTML = `
      <div class="emoji">${t.emoji}</div>
      <div class="name">${t.name}</div>
      <div class="desc">${t.description}</div>
      <div class="cat">${t.category}</div>
    `;
    card.onclick = () => toast(`${t.emoji} ${t.name} — ${t.description}`);
    pal.appendChild(card);
  }
}

// --- Load connections ---
async function loadConnections() {
  const res = await fetch(`${API}/api/connections`);
  const { connections } = await res.json();
  const list = document.getElementById('connList');
  list.innerHTML = '';
  for (const c of connections) {
    const item = document.createElement('div');
    item.className = 'conn-item';
    item.innerHTML = `
      <span class="type">${c.label}</span>
      <span style="color: var(--muted); font-size: 11px;">${c.type}</span>
      <span class="status unknown">stub</span>
    `;
    list.appendChild(item);
  }
}

// --- City rendering ---
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');

function drawCity() {
  ctx.fillStyle = '#070b14';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(120,160,255,.06)';
  for (let x = 0; x < canvas.width; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y < canvas.height; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }

  // Roads
  ctx.strokeStyle = 'rgba(120,160,255,.12)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 300); ctx.lineTo(canvas.width, 300);
  ctx.moveTo(600, 0); ctx.lineTo(600, canvas.height);
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawBuilding(d) {
  if (!d) return;
  const r = d.rect;
  const scale = canvas.width / 1200;
  const x = r.x * scale, y = r.y * (canvas.height / 600), w = r.w * scale, h = r.h * (canvas.height / 600);

  // Building
  ctx.fillStyle = 'rgba(22, 32, 56, .85)';
  ctx.strokeStyle = 'rgba(120, 160, 255, .3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 8);
  ctx.fill(); ctx.stroke();

  // Emoji + name
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(d.emoji || '🏢', x + w/2, y + 28);
  ctx.font = '600 11px "Segoe UI", sans-serif';
  ctx.fillStyle = '#e6eeff';
  const name = d.name.length > 16 ? d.name.slice(0, 14) + '…' : d.name;
  ctx.fillText(name, x + w/2, y + 48);
  // Category
  ctx.font = '600 9px "Segoe UI", sans-serif';
  ctx.fillStyle = '#56c8ff';
  ctx.fillText((d.category || '').toUpperCase(), x + w/2, y + 62);
  // Connections
  if (d.connections && Object.keys(d.connections).length > 0) {
    ctx.font = '8px sans-serif';
    ctx.fillStyle = '#46d68c';
    const conns = Object.keys(d.connections).join(', ');
    ctx.fillText('🔌 ' + conns, x + w/2, y + h - 8);
  }
}

async function loadCity() {
  const res = await fetch(`${API}/api/city`);
  const data = await res.json();
  drawCity();
  if (data.departments) {
    for (const d of data.departments) drawBuilding(d);
  }

  // Building list
  const list = document.getElementById('cityBuildings');
  list.innerHTML = '';
  for (const d of data.departments || []) {
    const el = document.createElement('div');
    el.className = 'city-b';
    const conns = d.connections ? Object.keys(d.connections).map(c => `<span class="conn">🔌${c}</span>`).join('') : '';
    el.innerHTML = `<span class="emoji">${d.emoji}</span> ${d.name} ${conns}`;
    list.appendChild(el);
  }

  // JSON editor
  document.getElementById('cityJsonEditor').value = JSON.stringify(data.config || { name: 'Empty', buildings: [] }, null, 2);

  // Stats
  updateStats(data.stats);
}

function updateStats(stats) {
  const el = document.getElementById('stats');
  if (!stats) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div><span class="lbl">Issued</span> ${stats.issued || 0}</div>
    <div><span class="lbl">Delivered</span> ${stats.delivered || 0}</div>
  `;
}

// --- Load default city ---
document.getElementById('loadDefaultBtn').onclick = async () => {
  const res = await fetch(`${API}/api/city/default`, { method: 'POST' });
  const data = await res.json();
  if (data.ok) { toast('Default city loaded', 'ok'); loadCity(); }
  else toast('Failed: ' + (data.errors || []).join(', '), 'err');
};

// --- Load from JSON ---
document.getElementById('loadJsonBtn').onclick = async () => {
  const text = document.getElementById('cityJsonEditor').value;
  let config;
  try { config = JSON.parse(text); } catch (e) { toast('Invalid JSON', 'err'); return; }
  const res = await fetch(`${API}/api/city/load`, {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ config }),
  });
  const data = await res.json();
  if (data.ok) { toast('City loaded', 'ok'); loadCity(); }
  else toast('Errors: ' + (data.errors || []).join(', '), 'err');
};

// --- Issue mission ---
document.getElementById('missionForm').onsubmit = async (e) => {
  e.preventDefault();
  const text = document.getElementById('missionText').value.trim();
  if (!text) return;
  document.getElementById('issueBtn').disabled = true;
  const res = await fetch(`${API}/api/mission`, {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  const data = await res.json();
  document.getElementById('missionBtn').disabled = false;
  document.getElementById('issueBtn').disabled = false;
  if (data.ok) { toast('Mission issued', 'ok'); document.getElementById('missionText').value = ''; }
  else toast('Failed: ' + data.error, 'err');
};

// --- Run simulation ---
document.getElementById('runBtn').onclick = async () => {
  const seconds = parseInt(document.getElementById('runSeconds').value) || 30;
  document.getElementById('runBtn').disabled = true;
  toast(`Running ${seconds}s simulation...`);
  const res = await fetch(`${API}/api/run`, {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({ seconds }),
  });
  const data = await res.json();
  document.getElementById('runBtn').disabled = false;
  if (data.stats) {
    updateStats(data.stats);
    // Show results
    const resultsEl = document.getElementById('results');
    resultsEl.innerHTML = '';
    for (const t of data.tasks || []) {
      const el = document.createElement('div');
      el.className = 'result';
      el.innerHTML = `<div class="order">Mission #${t.id}: ${t.text}</div>` +
        (t.results || []).map(r => `<div class="output">[${r.dept}] ${r.output}</div>`).join('');
      resultsEl.appendChild(el);
    }
    // Show events
    const feedEl = document.getElementById('eventFeed');
    feedEl.innerHTML = '';
    for (const ev of data.events || []) {
      const el = document.createElement('div');
      el.className = 'event ' + (ev.type || '');
      el.innerHTML = `<span class="t">t=${String(ev.t || 0).padStart(5)}s</span> ${ev.msg || ''}`;
      feedEl.appendChild(el);
    }
    toast(`${data.stats.delivered} delivered`, 'ok');
  } else {
    toast('Run failed: ' + (data.error || ''), 'err');
  }
};

// --- Init ---
loadTemplates();
loadConnections();
loadCity();
</script>
</body>
</html>
