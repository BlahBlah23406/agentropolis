<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agentropolis — your AI agents, as a city</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body { background: #6FBA47; overflow: hidden; color: #2d3436;
    font: 14px/1.45 "Segoe UI", "Nunito", system-ui, sans-serif; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { width: min(100vw, 158vh); height: auto; display: block; cursor: pointer; }

  .pill { position: fixed; z-index: 5; background: rgba(255,255,255,.93); border-radius: 999px;
    padding: 8px 16px; box-shadow: 0 2px 10px rgba(0,0,0,.2); font-weight: 700; }
  #title { top: 12px; left: 12px; }
  #title small { font-weight: 600; color: #8a8f98; margin-left: 6px; }
  #stats { top: 12px; right: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }

  #bar { position: fixed; z-index: 6; bottom: 12px; left: 50%; transform: translateX(-50%);
    width: min(700px, calc(100vw - 16px)); display: flex; gap: 8px; flex-wrap: wrap;
    background: rgba(255,255,255,.96); border-radius: 20px; padding: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,.28); }
  #orderForm { display: flex; gap: 8px; flex: 1 1 260px; }
  #orderText { flex: 1; min-width: 0; border: 2px solid #dfe6e9; border-radius: 12px;
    padding: 9px 12px; font: inherit; background: #fff; }
  #orderText:focus { outline: none; border-color: #43A047; }
  #issueBtn { background: #43A047; color: #fff; border: 0; border-radius: 12px;
    padding: 9px 16px; font-weight: 800; font-size: 14px; cursor: pointer; }
  #issueBtn:hover { background: #388E3C; }
  #barBtns { display: flex; gap: 6px; }
  #barBtns button { position: relative; width: 42px; height: 40px; border: 0; border-radius: 12px;
    background: #f1f3f5; font-size: 17px; cursor: pointer; }
  #barBtns button:hover { background: #e3e7ea; }
  button:focus-visible, #orderText:focus-visible { outline: 3px solid #74b9ff; outline-offset: 1px; }
  #ordersBadge { position: absolute; top: -5px; right: -5px; background: #E74C3C; color: #fff;
    font-size: 11px; font-weight: 800; border-radius: 999px; min-width: 18px; height: 18px;
    line-height: 18px; display: none; }

  #toasts { position: fixed; z-index: 7; top: 58px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none;
    width: min(560px, 94vw); }
  .toast { background: rgba(255,255,255,.95); border-radius: 999px; padding: 7px 15px;
    box-shadow: 0 3px 12px rgba(0,0,0,.22); font-size: 13px; font-weight: 600;
    max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: opacity .5s; }
  @media (prefers-reduced-motion: reduce) { .toast { transition: none; } }

  #popup { position: fixed; z-index: 8; background: #fff; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3); padding: 14px 38px 14px 16px;
    width: min(340px, 94vw); max-height: 52vh; overflow-y: auto; }
  #popup.sheet { left: 50%; bottom: 76px; top: auto; transform: translateX(-50%);
    width: min(460px, 94vw); }
  #popupClose { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
    border: 0; border-radius: 999px; background: #f1f3f5; cursor: pointer; font-size: 13px; }
  #popup h3 { font-size: 15px; margin-bottom: 2px; }
  #popup p { color: #636e72; font-size: 13px; margin: 4px 0; }
  #popup .prow { display: block; width: 100%; text-align: left; font: inherit; border: 0;
    padding: 8px 10px; border-radius: 10px; background: #f6f8f9; margin-top: 6px;
    font-size: 13px; cursor: pointer; }
  #popup .prow:hover { background: #e9eef1; }
  #popup .prow .st { font-size: 12px; color: #43A047; font-weight: 700; }
  #popup .prow .st.moving { color: #e67e22; }
  #popup .result { background: #f6f8f9; border-radius: 10px; padding: 8px 10px; margin-top: 6px;
    font-size: 13px; }
  #popup .chip { background: #eaf3ff; border: 0; border-radius: 999px; padding: 8px 12px;
    margin: 6px 6px 0 0; cursor: pointer; font: inherit; font-size: 13px; }
  #popup .chip:hover { background: #d8e9ff; }
  #popup .repairBtn { background: #E74C3C; color: #fff; border: 0; border-radius: 12px;
    padding: 9px 14px; font-weight: 800; cursor: pointer; margin-top: 8px; font: inherit; }
  #popup .backLink { background: none; border: 0; color: #2d7dd2; cursor: pointer;
    font-size: 13px; font-weight: 700; padding: 0; margin-bottom: 6px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="city" width="980" height="620"></canvas></div>
<div id="title" class="pill">🏙️ Agentropolis <small id="modeTag">mock city</small></div>
<div id="stats" class="pill" aria-live="off">📬 0 ✅ 0</div>
<div id="toasts" aria-live="polite"></div>
<div id="popup" hidden>
  <button id="popupClose" aria-label="Close">✕</button>
  <div id="popupBody"></div>
</div>
<div id="bar">
  <form id="orderForm">
    <input id="orderText" placeholder="Tell your city what to do…" autocomplete="off" aria-label="New order">
    <button id="issueBtn" type="submit">Issue</button>
  </form>
  <div id="barBtns">
    <button type="button" id="ideasBtn" aria-label="Order ideas" title="Order ideas">✨</button>
    <button type="button" id="ordersBtn" aria-label="Orders" title="Orders">📋<span id="ordersBadge"></span></button>
    <button type="button" id="newsBtn" aria-label="City news" title="City news">📰</button>
    <button type="button" id="chaosBtn" aria-label="Toggle chaos mode" title="Chaos: buildings can break down">🌤️</button>
    <button type="button" id="speedBtn" aria-label="Simulation speed" title="Speed">2×</button>
    <button type="button" id="pauseBtn" aria-label="Pause" title="Pause">⏸</button>
  </div>
</div>
<script type="module" src="city.js"></script>
</body>
</html>
