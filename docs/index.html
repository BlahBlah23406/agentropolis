<div id="bar">

<script type="module">
// Agentropolis engine — a task-orchestration simulator dressed as a city.
// Pure ES module, zero dependencies. Runs in Node (tests, headless demo)
// and in the browser (the city view just draws this state every frame).
//
// The metaphor, mapped to orchestration concepts:
//   Governor's order  -> user prompt / task
//   City Hall         -> intake + result delivery (the human's mailbox)
//   Dispatch Office   -> planner / router (decides the pipeline)
//   Department        -> specialized agent (calendar, research, writing, ...)
//   Truck             -> message payload moving between agents
//   Road              -> connection / channel
//   Worker dot        -> concurrency slot inside an agent
//   City Archive      -> long-term memory / task history

// ---------------------------------------------------------------- layout ---

export const CANVAS_W = 980;
export const CANVAS_H = 620;
export const ROAD_Y = 310; // main street
const BUILDING_W = 180;
const BUILDING_H = 112;
const TOP_ROW_Y = 78;
const BOTTOM_ROW_Y = 430;
const COL_X = [28, 268, 508, 748];

export const DEPARTMENTS = {
  cityhall: { id: 'cityhall', name: 'City Hall', emoji: '\u{1F3DB}\u{FE0F}', row: 0, col: 0, workers: 1, duration: 0,
    desc: "The Governor's seat. Orders leave from here and finished work is delivered back here." },
  dispatch: { id: 'dispatch', name: 'Dispatch Office', emoji: '\u{1F5FA}\u{FE0F}', row: 0, col: 1, workers: 2, duration: 0.8,
    desc: 'Reads every order and plans which departments will handle it, in what sequence.' },
  research: { id: 'research', name: 'Research Library', emoji: '\u{1F4DA}', row: 0, col: 2, workers: 2, duration: 2.2,
    desc: 'Looks things up and gathers facts.',
    role: 'You are the Research Library. Gather concise, factual notes on the request. Reply in under 120 words.' },
  math: { id: 'math', name: 'Math Works', emoji: '\u{1F9EE}', row: 0, col: 3, workers: 2, duration: 1.6,
    desc: 'Calculations, budgets, estimates, conversions.',
    role: 'You are Math Works. Do the calculation or estimate requested and show the key numbers. Reply in under 80 words.' },
  calendar: { id: 'calendar', name: 'Calendar Bureau', emoji: '\u{1F4C5}', row: 1, col: 0, workers: 2, duration: 1.4,
    desc: 'Scheduling, reminders, appointments.',
    role: 'You are the Calendar Bureau. Propose a concrete schedule entry (title, day, time) for the request. Reply in under 60 words.' },
  writing: { id: 'writing', name: "Writers' Guild", emoji: '\u{270D}\u{FE0F}', row: 1, col: 1, workers: 2, duration: 2.4,
    desc: 'Drafting, summarizing, polishing text.',
    role: 'You are the Writers’ Guild. Turn the input into a short, polished piece of writing. Reply in under 120 words.' },
  post: { id: 'post', name: 'Post Office', emoji: '\u{1F4EE}', row: 1, col: 2, workers: 2, duration: 1.0,
    desc: 'Sends, notifies, delivers to the outside world.',
    role: 'You are the Post Office. Format the input as a ready-to-send message with a subject line. Reply in under 100 words.' },
  archive: { id: 'archive', name: 'City Archive', emoji: '\u{1F5C4}\u{FE0F}', row: 1, col: 3, workers: 1, duration: 0.5,
    desc: 'Long-term memory. Every finished order is filed here.' },
};

export function buildingRect(deptId) {
  const d = DEPARTMENTS[deptId];
  const x = COL_X[d.col];
  const y = d.row === 0 ? TOP_ROW_Y : BOTTOM_ROW_Y;
  return { x, y, w: BUILDING_W, h: BUILDING_H };
}

export function doorPoint(deptId) {
  const r = buildingRect(deptId);
  const d = DEPARTMENTS[deptId];
  // doors face the main street
  return d.row === 0
    ? { x: r.x + r.w / 2, y: r.y + r.h }
    : { x: r.x + r.w / 2, y: r.y };
}

// Manhattan path along the driveway -> main street -> driveway.
export function roadPath(fromDept, toDept) {
  const a = doorPoint(fromDept);
  const b = doorPoint(toDept);
  return [a, { x: a.x, y: ROAD_Y }, { x: b.x, y: ROAD_Y }, b];
}

function pathLength(path) {
  let len = 0;
  for (let i = 1; i < path.length; i++) {
    len += Math.abs(path[i].x - path[i - 1].x) + Math.abs(path[i].y - path[i - 1].y);
  }
  return len;
}

// -------------------------------------------------------------- planning ---

const ROUTE_RULES = [
  { dept: 'research', rx: /research|find|look\s?up|search|learn|what\s+is|who\s+is|compare|history|facts?\b/i },
  { dept: 'math', rx: /calculat|math|budget|estimat|convert|how\s+much|how\s+many|percent|total|cost/i },
  { dept: 'writing', rx: /writ|draft|summar|blog|report|essay|poem|caption|rewrite|explain|email|letter|note\b/i },
  { dept: 'calendar', rx: /schedul|meeting|calendar|remind|appointment|book\b|plan\s+my|event/i },
  { dept: 'post', rx: /send|email|notify|deliver|message|post\s+it|share/i },
];

// Deterministic keyword planner — the fallback when no LLM planner is
// plugged in (or when the LLM one fails or answers nonsense).
export function planRoute(text) {
  const steps = ROUTE_RULES.filter(r => r.rx.test(text)).map(r => r.dept);
  if (steps.length === 0) return ['research', 'writing']; // sensible default pipeline
  return steps;
}

const WORKABLE = ['research', 'math', 'writing', 'calendar', 'post'];

// Turn a planner's raw answer (string or array) into a valid pipeline,
// or null if nothing usable survives validation.
export function sanitizePlan(raw) {
  let parts;
  if (Array.isArray(raw)) parts = raw;
  else if (typeof raw === 'string') parts = raw.toLowerCase().split(/[,\s→>|/]+/);
  else return null;
  const plan = [];
  for (const p of parts.map(s => String(s).trim().toLowerCase())) {
    if (WORKABLE.includes(p) && !plan.includes(p)) plan.push(p);
  }
  return plan.length ? plan.slice(0, 4) : null;
}

// LLM-powered Dispatch Office: reads the order and decides the pipeline.
export function llmPlanner({ url = 'http://127.0.0.1:11434', model = 'llama3.2', fetchFn } = {}) {
  const doFetch = fetchFn || fetch;
  const system = 'You are the Dispatch Office of a city of AI departments. Departments: '
    + 'research (looks up facts), math (calculations and estimates), writing (drafts and polishes text), '
    + 'calendar (scheduling and reminders), post (formats and sends messages out). '
    + 'Given the Governor’s order, reply with ONLY the department ids that should handle it, '
    + 'comma-separated, in processing order. Use 1 to 3 departments. No other words.';
  return async (task) => {
    const res = await doFetch(`${url}/api/generate`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ model, system, prompt: `Order: ${task.text}`, stream: false }),
    });
    if (!res.ok) throw new Error(`planner call failed: ${res.status}`);
    const data = await res.json();
    return (data.response || '').trim();
  };
}

// ---------------------------------------------------------- mock workers ---

function topicOf(text) {
  const t = text.replace(/^(please\s+)?(can\s+you\s+)?(research|find|look\s?up|search|write|draft|summarize|schedule|calculate|send|plan)\s*/i, '').trim();
  return (t || text).slice(0, 60);
}

export function mockWorkers() {
  return {
    research: async (task) =>
      `Research notes on “${topicOf(task.text)}”: gathered 3 sources, extracted the key facts, flagged 1 open question. (mock output)`,
    math: async (task) =>
      `Math Works ran the numbers for “${topicOf(task.text)}”: totals computed, 2 scenarios compared. (mock output)`,
    writing: async (task, input) =>
      `Polished draft based on ${input ? 'the incoming notes' : 'the order'}: “${topicOf(task.text)}” — 3 tight paragraphs, ready to read. (mock output)`,
    calendar: async (task) =>
      `Calendar entry proposed for “${topicOf(task.text)}”: Thursday 10:00–10:30, reminder 15 min before. (mock output)`,
    post: async (task) =>
      `Envelope sealed: “${topicOf(task.text)}” formatted with a subject line and queued for delivery. (mock output)`,
  };
}

// ------------------------------------------------------------ LLM workers ---
// Optional: point the city at any Ollama server (or an OpenAI-compatible
// /api/generate proxy) and the departments become real LLM agents.

export function llmWorkers({ url = 'http://127.0.0.1:11434', model = 'llama3.2', fetchFn } = {}) {
  const doFetch = fetchFn || fetch;
  const call = async (system, prompt) => {
    const res = await doFetch(`${url}/api/generate`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ model, system, prompt, stream: false }),
    });
    if (!res.ok) throw new Error(`LLM call failed: ${res.status}`);
    const data = await res.json();
    return (data.response || '').trim();
  };
  const workers = {};
  for (const d of Object.values(DEPARTMENTS)) {
    if (!d.role) continue;
    workers[d.id] = (task, input) =>
      call(d.role, input ? `Order: ${task.text}\n\nInput from the previous department:\n${input}` : `Order: ${task.text}`);
  }
  workers.dispatch = llmPlanner({ url, model, fetchFn });
  return workers;
}

// ------------------------------------------------------------------ city ---

const VEHICLE_SPEED = 230; // px per simulated second

export function createCity({ workers, chaos = false, failRate = 0.25, random = Math.random } = {}) {
  const city = {
    time: 0,
    nextId: 1,
    tasks: {},        // id -> task
    vehicles: [],     // trucks on the road
    events: [],       // { t, msg }
    onEvent: null,
    workers: workers || mockWorkers(),
    chaos,            // when true, departments randomly break down mid-job
    failRate,
    random,
    depts: {},        // id -> { queue: [], slots: [{ job|null }], broken }
    stats: { issued: 0, delivered: 0, breakdowns: 0 },
  };
  for (const d of Object.values(DEPARTMENTS)) {
    city.depts[d.id] = { queue: [], slots: Array.from({ length: d.workers }, () => ({ job: null })), broken: false };
  }
  return city;
}

function emit(city, msg) {
  const ev = { t: Number(city.time.toFixed(1)), msg };
  city.events.push(ev);
  if (city.events.length > 200) city.events.shift();
  if (city.onEvent) city.onEvent(ev);
}

export function issueOrder(city, text) {
  const task = {
    id: city.nextId++,
    text,
    status: 'heading to Dispatch',
    location: 'road',
    plan: null,
    step: 0,
    results: [],   // { dept, output }
    issuedAt: city.time,
    deliveredAt: null,
    archived: false,
  };
  city.tasks[task.id] = task;
  city.stats.issued++;
  spawnVehicle(city, task, 'cityhall', 'dispatch', 'order');
  emit(city, `\u{1F3DB}\u{FE0F} Governor issued order #${task.id}: “${text}”`);
  return task;
}

function spawnVehicle(city, task, fromDept, toDept, kind) {
  const path = roadPath(fromDept, toDept);
  city.vehicles.push({
    id: `${task ? task.id : 'x'}-${kind}-${city.vehicles.length}-${Math.floor(city.time * 10)}`,
    taskId: task ? task.id : null,
    kind, // 'order' | 'handoff' | 'result' | 'archive'
    from: fromDept,
    to: toDept,
    path,
    dist: 0,
    total: pathLength(path),
    pos: { ...path[0] },
  });
}

function positionAlong(path, dist) {
  let remaining = dist;
  for (let i = 1; i < path.length; i++) {
    const seg = Math.abs(path[i].x - path[i - 1].x) + Math.abs(path[i].y - path[i - 1].y);
    if (remaining <= seg || i === path.length - 1) {
      const f = seg === 0 ? 1 : Math.min(1, remaining / seg);
      return {
        x: path[i - 1].x + (path[i].x - path[i - 1].x) * f,
        y: path[i - 1].y + (path[i].y - path[i - 1].y) * f,
      };
    }
    remaining -= seg;
  }
  return { ...path[path.length - 1] };
}

function arrive(city, v) {
  const task = v.taskId != null ? city.tasks[v.taskId] : null;
  if (v.kind === 'order' || v.kind === 'handoff') {
    const dept = DEPARTMENTS[v.to];
    city.depts[v.to].queue.push({ taskId: task.id, input: lastOutput(task) });
    task.location = v.to;
    task.status = `queued at ${dept.name}`;
    emit(city, `\u{1F69A} Order #${task.id} arrived at ${dept.emoji} ${dept.name}`);
  } else if (v.kind === 'result') {
    task.location = 'cityhall';
    task.status = 'delivered';
    task.deliveredAt = city.time;
    city.stats.delivered++;
    emit(city, `✅ Order #${task.id} delivered to City Hall (${task.results.length} department${task.results.length === 1 ? '' : 's'} contributed)`);
    spawnVehicle(city, task, 'cityhall', 'archive', 'archive');
  } else if (v.kind === 'archive') {
    task.archived = true;
    emit(city, `\u{1F5C4}\u{FE0F} Order #${task.id} filed in the City Archive`);
  } else if (v.kind === 'repair') {
    const dept = DEPARTMENTS[v.to];
    city.depts[v.to].broken = false;
    emit(city, `\u{1F527} ${dept.name} repaired — back to work`);
  }
}

// The human-in-the-loop fix: a broken building stays broken (smoking, queue
// piling up) until someone sends a repair crew from City Hall.
export function sendRepairCrew(city, deptId) {
  const state = city.depts[deptId];
  if (!state || !state.broken) return false;
  if (city.vehicles.some(v => v.kind === 'repair' && v.to === deptId)) return false;
  spawnVehicle(city, null, 'cityhall', deptId, 'repair');
  emit(city, `\u{1F692} Repair crew dispatched to ${DEPARTMENTS[deptId].name}`);
  return true;
}

function lastOutput(task) {
  return task.results.length ? task.results[task.results.length - 1].output : null;
}

function startJobs(city) {
  for (const [deptId, state] of Object.entries(city.depts)) {
    if (state.broken) continue; // no work while the building is smoking
    const meta = DEPARTMENTS[deptId];
    for (const slot of state.slots) {
      if (slot.job || state.queue.length === 0) continue;
      const item = state.queue.shift();
      const task = city.tasks[item.taskId];
      const job = {
        taskId: item.taskId, input: item.input, remaining: meta.duration,
        output: null, ready: false, failed: null, planner: null,
        willFail: city.chaos && deptId !== 'dispatch' && city.random() < city.failRate,
      };
      slot.job = job;
      task.status = `working at ${meta.name}`;
      if (deptId === 'dispatch') {
        const fn = city.workers.dispatch;
        if (!fn) {
          job.output = planRoute(task.text);
          job.planner = 'keywords';
          job.ready = true;
        } else {
          Promise.resolve()
            .then(() => fn(task))
            .then(raw => {
              const plan = sanitizePlan(raw);
              if (plan) { job.output = plan; job.planner = 'llm'; }
              else { job.output = planRoute(task.text); job.planner = 'keyword fallback'; }
              job.ready = true;
            })
            .catch(() => {
              job.output = planRoute(task.text);
              job.planner = 'keyword fallback';
              job.ready = true;
            });
        }
      } else {
        const fn = city.workers[deptId];
        Promise.resolve()
          .then(() => (fn ? fn(task, item.input) : `${meta.name} acknowledged the order.`))
          .then(out => { job.output = out; job.ready = true; })
          .catch(err => { job.failed = String(err && err.message || err); job.ready = true; });
      }
    }
  }
}

function finishJobs(city) {
  for (const [deptId, state] of Object.entries(city.depts)) {
    const meta = DEPARTMENTS[deptId];
    for (const slot of state.slots) {
      const job = slot.job;
      if (!job || job.remaining > 0 || !job.ready) continue;
      slot.job = null;
      const task = city.tasks[job.taskId];
      if (job.willFail && !job.failed) job.failed = 'machinery breakdown';
      if (job.failed) {
        task.retries = (task.retries || 0) + 1;
        city.stats.breakdowns++;
        if (task.retries <= 2) {
          // the building breaks; the order waits inside until a repair crew arrives
          state.broken = true;
          state.queue.unshift({ taskId: job.taskId, input: job.input });
          task.status = `waiting for repairs at ${meta.name}`;
          emit(city, `\u{1F4A5} Breakdown at ${meta.emoji} ${meta.name} while working order #${task.id} (${job.failed}) — send a repair crew!`);
        } else {
          emit(city, `⚠️ ${meta.name} failed order #${task.id} three times (${job.failed}) — sending it back`);
          task.results.push({ dept: deptId, output: `(failed after 3 attempts: ${job.failed})` });
          task.status = 'returning with errors';
          spawnVehicle(city, task, deptId, 'cityhall', 'result');
        }
        continue;
      }
      if (deptId === 'dispatch') {
        task.plan = job.output;
        task.step = 0;
        emit(city, `\u{1F5FA}\u{FE0F} Dispatch planned order #${task.id}: ${task.plan.map(p => DEPARTMENTS[p].name).join(' → ')}${job.planner === 'llm' ? ' \u{1F9E0}' : job.planner === 'keyword fallback' ? ' (keyword fallback)' : ''}`);
        task.status = 'in transit';
        spawnVehicle(city, task, 'dispatch', task.plan[0], 'handoff');
      } else {
        task.results.push({ dept: deptId, output: job.output });
        emit(city, `${meta.emoji} ${meta.name} finished its part of order #${task.id}`);
        task.step++;
        if (task.plan && task.step < task.plan.length) {
          task.status = 'in transit';
          spawnVehicle(city, task, deptId, task.plan[task.step], 'handoff');
        } else {
          task.status = 'returning to City Hall';
          spawnVehicle(city, task, deptId, 'cityhall', 'result');
        }
      }
    }
  }
}

export function tick(city, dt) {
  city.time += dt;
  // move trucks
  for (const v of city.vehicles) {
    v.dist += VEHICLE_SPEED * dt;
    v.pos = positionAlong(v.path, Math.min(v.dist, v.total));
  }
  const arrived = city.vehicles.filter(v => v.dist >= v.total);
  city.vehicles = city.vehicles.filter(v => v.dist < v.total);
  for (const v of arrived) arrive(city, v);
  // run department work
  for (const state of Object.values(city.depts)) {
    for (const slot of state.slots) {
      if (slot.job) slot.job.remaining -= dt;
    }
  }
  startJobs(city);
  finishJobs(city);
}

// Headless helper: advance the city by `seconds`, yielding to the microtask
// queue so async workers can resolve. Used by tests and the CLI demo.
export async function runFor(city, seconds, step = 0.05) {
  let t = 0;
  while (t < seconds) {
    tick(city, step);
    t += step;
    await Promise.resolve();
  }
}

// Agentropolis city view — a Pocket City-style skin over the engine.
// The city IS the interface: tap buildings and trucks to inspect, tap a
// smoking building to send the repair crew. The bottom bar issues orders.


const params = new URLSearchParams(location.search);
const useLLM = params.get('llm') === '1';
const city = createCity(useLLM ? {
  workers: llmWorkers({
    url: params.get('ollama') || '/api/ollama',
    model: params.get('model') || 'llama3.2',
  }),
} : {});
if (params.get('chaos') === '1') city.chaos = true;
if (params.get('failrate')) city.failRate = Math.min(1, Math.max(0, Number(params.get('failrate'))));

if (params.get('demo') === '1') {
  setTimeout(async () => {
    issueOrder(city, 'Research electric bikes and write a short report');
    issueOrder(city, 'Schedule a dentist appointment for next week');
    issueOrder(city, 'Calculate the budget for a 4-day trip and email it to me');
    // ?ff=12 fast-forwards the sim 12s on load (screenshots, quick previews)
    if (params.get('ff')) await runFor(city, Number(params.get('ff')));
  }, 400);
}

const canvas = document.getElementById('city');
const ctx = canvas.getContext('2d');
const popupEl = document.getElementById('popup');
const popupBody = document.getElementById('popupBody');
const toastsEl = document.getElementById('toasts');
const statsEl = document.getElementById('stats');
const badgeEl = document.getElementById('ordersBadge');

document.getElementById('modeTag').textContent = useLLM ? '🧠 LLM city' : 'mock city';

let speed = 2;
let paused = false;
let popup = null; // { kind: 'dept'|'truck'|'orders'|'order'|'news'|'ideas', id?, wx?, wy? }

// ------------------------------------------------------------------ input

document.getElementById('orderForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('orderText');
  const text = input.value.trim();
  if (!text) return;
  issueOrder(city, text);
  input.value = '';
});

const RUSH_ORDERS = [
  'Schedule a budget review meeting', 'Research the new bike lanes and write a memo',
  'Calculate quarterly road maintenance costs', 'Write a speech for the bridge opening',
  'Send a newsletter about the summer festival', 'Research rival cities and summarize',
  'Schedule interviews for the new librarian', 'Calculate the parade budget and email it',
];
const IDEAS = [
  'Schedule a dentist appointment for next week',
  'Research electric bikes and write a short report',
  'Calculate the budget for a 4-day trip and email it to me',
  'Write a haiku about morning traffic',
];

document.getElementById('ideasBtn').addEventListener('click', () => togglePopup({ kind: 'ideas' }));
document.getElementById('ordersBtn').addEventListener('click', () => togglePopup({ kind: 'orders' }));
document.getElementById('newsBtn').addEventListener('click', () => togglePopup({ kind: 'news' }));

const chaosBtn = document.getElementById('chaosBtn');
function syncChaosBtn() {
  chaosBtn.textContent = city.chaos ? '🌩️' : '🌤️';
  chaosBtn.style.background = city.chaos ? '#ffe2b8' : '';
}
chaosBtn.addEventListener('click', () => {
  city.chaos = !city.chaos;
  syncChaosBtn();
  toast(city.chaos ? '🌩️ Chaos on — buildings may break down!' : '🌤️ Chaos off — clear skies');
});
syncChaosBtn();

const SPEEDS = [1, 2, 4];
const speedBtn = document.getElementById('speedBtn');
speedBtn.addEventListener('click', () => {
  speed = SPEEDS[(SPEEDS.indexOf(speed) + 1) % SPEEDS.length];
  speedBtn.textContent = speed + '×';
});

const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
});

document.getElementById('popupClose').addEventListener('click', closePopup);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

// everything inside popups goes through delegation
popupBody.addEventListener('click', (e) => {
  const t = e.target.closest('[data-o],[data-order],[data-repair],[data-back],[data-rush]');
  if (!t) return;
  if (t.dataset.o) { issueOrder(city, t.dataset.o); closePopup(); }
  else if (t.dataset.rush) { for (const o of RUSH_ORDERS) issueOrder(city, o); closePopup(); }
  else if (t.dataset.order) openPopup({ kind: 'order', id: Number(t.dataset.order) });
  else if (t.dataset.repair) { sendRepairCrew(city, t.dataset.repair); renderPopup(); }
  else if (t.dataset.back !== undefined) openPopup({ kind: 'orders' });
});

// tap the city itself: trucks first, then buildings, then empty ground
canvas.addEventListener('click', (e) => {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (CANVAS_W / r.width);
  const y = (e.clientY - r.top) * (CANVAS_H / r.height);

  let bestTruck = null;
  for (const v of city.vehicles) {
    const d = Math.hypot(v.pos.x - x, v.pos.y - y);
    if (d < 24 && (!bestTruck || d < bestTruck.d)) bestTruck = { v, d };
  }
  if (bestTruck) { openPopup({ kind: 'truck', id: bestTruck.v.id }); return; }

  for (const id of Object.keys(DEPARTMENTS)) {
    const b = buildingRect(id);
    if (x >= b.x - 4 && x <= b.x + b.w + 4 && y >= b.y - 4 && y <= b.y + b.h + 4) {
      if (city.depts[id].broken && sendRepairCrew(city, id)) {
        toast(`🚒 Repair crew rolling out to ${DEPARTMENTS[id].name}!`);
      }
      openPopup({ kind: 'dept', id });
      return;
    }
  }
  closePopup();
});

// ------------------------------------------------------------------ popups

function togglePopup(state) {
  if (popup && popup.kind === state.kind) closePopup();
  else openPopup(state);
}
function openPopup(state) {
  popup = state;
  popupEl.hidden = false;
  renderPopup();
}
function closePopup() {
  popup = null;
  popupEl.hidden = true;
}

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;'); }

const RENDER = {
  dept() {
    const d = DEPARTMENTS[popup.id];
    const state = city.depts[popup.id];
    const busy = state.slots.filter(s => s.job).length;
    const crewComing = city.vehicles.some(v => v.kind === 'repair' && v.to === popup.id);
    const broken = state.broken
      ? (crewComing
        ? `<p style="color:#e67e22;font-weight:700">🚒 A repair crew is on its way…</p>`
        : `<p style="color:#E74C3C;font-weight:700">💥 Breakdown! Work is stopped and the line is growing.</p>
           <button class="repairBtn" data-repair="${popup.id}">🚒 Send repair crew</button>`)
      : '';
    const jobs = state.slots.filter(s => s.job)
      .map(s => `<p>👷 order #${s.job.taskId} — ${Math.max(0, s.job.remaining).toFixed(1)}s left</p>`).join('');
    return `<h3>${d.emoji} ${d.name}</h3>
      <p>${d.desc}</p>
      <p>👥 ${state.slots.length} worker${state.slots.length > 1 ? 's' : ''} · ${busy} busy · ${state.queue.length} in line</p>
      ${broken}${jobs}`;
  },
  truck() {
    const v = city.vehicles.find(v => v.id === popup.id);
    if (!v) return '<p>This truck has finished its trip.</p>';
    const KIND = {
      order: '📦 Carrying a fresh order to the Dispatch Office',
      handoff: '📦 Delivering work to the next department',
      result: '🎁 Bringing finished results back to City Hall',
      archive: '🗂️ Filing a copy at the City Archive',
      repair: `🚒 Repair crew heading to ${DEPARTMENTS[v.to].name}`,
    };
    const task = v.taskId != null ? city.tasks[v.taskId] : null;
    return `<h3>${v.kind === 'repair' ? '🚒 Repair truck' : '🚚 Delivery truck'}</h3>
      <p>${KIND[v.kind]}</p>
      ${task ? `<div class="result">#${task.id} — ${esc(task.text)}</div>` : ''}`;
  },
  orders() {
    const tasks = Object.values(city.tasks).slice(-12).reverse();
    if (!tasks.length) return '<h3>📋 Orders</h3><p>No orders yet. The city is quiet… try ✨ for ideas.</p>';
    return '<h3>📋 Orders</h3><p>Tap one to see its progress.</p>' + tasks.map(t => {
      const moving = t.status !== 'delivered';
      return `<button class="prow" data-order="${t.id}">
        #${t.id} — ${esc(t.text)}<br>
        <span class="st ${moving ? 'moving' : ''}">${moving ? '🚚 ' : '✅ '}${esc(t.status)}</span>
      </button>`;
    }).join('');
  },
  order() {
    const t = city.tasks[popup.id];
    if (!t) return '<p>Order not found.</p>';
    const moving = t.status !== 'delivered';
    const plan = t.plan ? t.plan.map(p => `${DEPARTMENTS[p].emoji} ${DEPARTMENTS[p].name}`).join(' → ') : 'being planned at Dispatch…';
    const results = t.results.map(r =>
      `<div class="result"><b>${DEPARTMENTS[r.dept].emoji} ${DEPARTMENTS[r.dept].name}</b><br>${esc(r.output)}</div>`).join('');
    return `<button class="backLink" data-back>← all orders</button>
      <h3>Order #${t.id}</h3>
      <p>${esc(t.text)}</p>
      <p><span class="st ${moving ? 'moving' : ''}" style="font-size:13px">${moving ? '🚚 ' : '✅ '}${esc(t.status)}</span></p>
      <p>🗺️ Route: ${plan}</p>
      ${results}`;
  },
  news() {
    const rows = city.events.slice(-30).reverse()
      .map(e => `<div class="result">${esc(e.msg)}</div>`).join('');
    return '<h3>📰 City Gazette</h3>' + (rows || '<p>Nothing has happened yet.</p>');
  },
  ideas() {
    return '<h3>✨ Order ideas</h3><p>Tap one to send it to City Hall.</p>'
      + IDEAS.map(o => `<button class="chip" data-o="${esc(o)}">${esc(o)}</button>`).join('')
      + '<p style="margin-top:10px"><button class="chip" data-rush="1" style="background:#ffe9d6">🚦 Rush hour — 8 orders at once</button></p>';
  },
};

function renderPopup() {
  if (!popup) return;
  popupBody.innerHTML = RENDER[popup.kind]();

  // world-anchored popups follow their building/truck; the rest sit above the bar
  let anchor = null;
  if (popup.kind === 'dept') {
    const b = buildingRect(popup.id);
    anchor = { x: b.x + b.w / 2, y: b.y };
  } else if (popup.kind === 'truck') {
    const v = city.vehicles.find(v => v.id === popup.id);
    if (v) anchor = { x: v.pos.x, y: v.pos.y - 14 };
  }
  popupEl.classList.toggle('sheet', !anchor);
  if (anchor) {
    const r = canvas.getBoundingClientRect();
    const s = r.width / CANVAS_W;
    const w = popupEl.offsetWidth, h = popupEl.offsetHeight;
    let left = r.left + anchor.x * s - w / 2;
    let top = r.top + anchor.y * s - h - 12;
    left = Math.max(8, Math.min(left, window.innerWidth - w - 8));
    if (top < 8) top = r.top + anchor.y * s + 26;
    popupEl.style.left = left + 'px';
    popupEl.style.top = top + 'px';
    popupEl.style.transform = 'none';
  } else {
    popupEl.style.left = '';
    popupEl.style.top = '';
    popupEl.style.transform = '';
  }
}

// ------------------------------------------------------------------ toasts

function toast(msg) {
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  toastsEl.append(div);
  while (toastsEl.children.length > 3) toastsEl.firstChild.remove();
  setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 600); }, 4200);
}

city.onEvent = (ev) => {
  toast(ev.msg);
  if (popup) renderPopup();
};

// ------------------------------------------------------------------ drawing

const DEPT_COLORS = {
  cityhall: '#F2B441', dispatch: '#4FA3E8', research: '#A278E0', math: '#F07356',
  calendar: '#3FC1A4', writing: '#F08CC0', post: '#F0A045', archive: '#9AA5B5',
};
const GRASS = '#6FBA47', GRASS_LIGHT = '#79C653';
const ROAD = '#EDE4CF', ROAD_EDGE = '#DBD0B4';

function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const ch = (v) => Math.max(0, Math.min(255, Math.round(v * f)));
  return `rgb(${ch(n >> 16)},${ch((n >> 8) & 255)},${ch(n & 255)})`;
}

const TREES = [
  [60, 32], [240, 22], [460, 40], [700, 26], [935, 55],
  [16, 250], [460, 252], [950, 250],
  [22, 392], [700, 392], [952, 396],
  [130, 598], [350, 594], [590, 598], [760, 594],
];

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawTree(x, y) {
  ctx.beginPath(); ctx.ellipse(x + 3, y + 5, 12, 6, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(45,80,30,.25)'; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, 13, 0, Math.PI * 2); ctx.fillStyle = '#3E8E3E'; ctx.fill();
  ctx.beginPath(); ctx.arc(x - 3, y - 3, 8, 0, Math.PI * 2); ctx.fillStyle = '#55A855'; ctx.fill();
}

function drawPond() {
  ctx.beginPath(); ctx.ellipse(880, 588, 48, 22, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#4FA9DE'; ctx.fill();
  ctx.beginPath(); ctx.ellipse(872, 584, 30, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#6BBCE8'; ctx.fill();
}

function drawBuilding(id) {
  const d = DEPARTMENTS[id];
  const b = buildingRect(id);
  const state = city.depts[id];
  const color = DEPT_COLORS[id];

  // shadow
  ctx.fillStyle = 'rgba(45,80,30,.3)';
  roundRect(b.x + 5, b.y + 7, b.w, b.h, 12); ctx.fill();
  // walls (lower part) + roof (upper part)
  ctx.fillStyle = shade(color, 0.8);
  roundRect(b.x, b.y, b.w, b.h, 12); ctx.fill();
  ctx.fillStyle = color;
  roundRect(b.x, b.y, b.w, 64, 12); ctx.fill();
  ctx.fillRect(b.x, b.y + 40, b.w, 24); // square off the roof's bottom edge
  ctx.strokeStyle = shade(color, 1.14); ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(b.x + 3, b.y + 64); ctx.lineTo(b.x + b.w - 3, b.y + 64); ctx.stroke();

  // roof sign
  ctx.textAlign = 'center';
  ctx.font = '30px sans-serif';
  ctx.fillText(d.emoji, b.x + b.w / 2, b.y + 42);

  // windows + door on the walls
  ctx.fillStyle = 'rgba(255,255,255,.88)';
  for (let i = 0; i < 4; i++) {
    roundRect(b.x + 22 + i * 38, b.y + 74, 14, 15, 3); ctx.fill();
  }
  ctx.fillStyle = shade(color, 0.55);
  roundRect(b.x + b.w / 2 - 8, b.y + b.h - 22, 16, 22, 4); ctx.fill();

  // worker dots by the door: green idle, orange busy (pulsing)
  const n = state.slots.length;
  for (let i = 0; i < n; i++) {
    const wx = b.x + 26 + i * 20;
    const wy = b.y + b.h - 12;
    const slot = state.slots[i];
    const pulse = slot.job ? 1.5 * Math.abs(Math.sin(city.time * 4)) : 0;
    ctx.beginPath(); ctx.arc(wx, wy, 6 + pulse, 0, Math.PI * 2);
    ctx.fillStyle = slot.job ? '#F39C12' : '#2ECC71'; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1.5; ctx.stroke();
  }

  // queue badge
  if (state.queue.length) {
    ctx.beginPath(); ctx.arc(b.x + b.w - 14, b.y - 2, 12, 0, Math.PI * 2);
    ctx.fillStyle = '#E74C3C'; ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif';
    ctx.fillText(String(state.queue.length), b.x + b.w - 14, b.y + 3);
  }

  // name plate
  const label = state.broken ? `💥 ${d.name}` : d.name;
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = state.broken ? 'rgba(255,235,235,.95)' : 'rgba(255,255,255,.92)';
  roundRect(b.x + b.w / 2 - tw / 2 - 9, b.y + b.h + 8, tw + 18, 20, 10); ctx.fill();
  ctx.fillStyle = state.broken ? '#C0392B' : '#2d3436';
  ctx.fillText(label, b.x + b.w / 2, b.y + b.h + 22);

  if (state.broken) {
    // pulsing outline, drifting smoke, bouncing wrench = "tap me!"
    ctx.strokeStyle = `rgba(231,76,60,${0.55 + 0.45 * Math.sin(city.time * 5)})`;
    ctx.lineWidth = 4;
    roundRect(b.x - 2, b.y - 2, b.w + 4, b.h + 4, 13); ctx.stroke();
    for (let i = 0; i < 3; i++) {
      const phase = (city.time * 0.7 + i / 3) % 1;
      ctx.beginPath();
      ctx.arc(b.x + b.w * (0.3 + i * 0.2) + Math.sin(city.time * 2 + i) * 5,
        b.y - 8 - phase * 36, 5 + phase * 9, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(120,120,128,${0.5 * (1 - phase)})`;
      ctx.fill();
    }
    ctx.font = '22px sans-serif';
    ctx.fillText('🔧', b.x + b.w / 2, b.y - 16 - 5 * Math.abs(Math.sin(city.time * 3)));
  }
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  // lawn with mowing stripes
  ctx.fillStyle = GRASS;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = GRASS_LIGHT;
  for (let y = 0; y < CANVAS_H; y += 80) ctx.fillRect(0, y, CANVAS_W, 40);

  // main street + driveways (light pavement, Pocket City style)
  ctx.fillStyle = ROAD_EDGE;
  ctx.fillRect(0, ROAD_Y - 30, CANVAS_W, 60);
  for (const id of Object.keys(DEPARTMENTS)) {
    const door = doorPoint(id);
    const top = Math.min(door.y, ROAD_Y);
    ctx.fillRect(door.x - 15, top, 30, Math.abs(door.y - ROAD_Y));
  }
  ctx.fillStyle = ROAD;
  ctx.fillRect(0, ROAD_Y - 25, CANVAS_W, 50);
  for (const id of Object.keys(DEPARTMENTS)) {
    const door = doorPoint(id);
    const top = Math.min(door.y, ROAD_Y);
    ctx.fillRect(door.x - 11, top, 22, Math.abs(door.y - ROAD_Y));
  }
  ctx.strokeStyle = '#fff';
  ctx.setLineDash([16, 14]); ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, ROAD_Y); ctx.lineTo(CANVAS_W, ROAD_Y); ctx.stroke();
  ctx.setLineDash([]);

  drawPond();
  for (const [x, y] of TREES) drawTree(x, y);
  for (const id of Object.keys(DEPARTMENTS)) drawBuilding(id);

  // highlight the inspected building
  if (popup && popup.kind === 'dept') {
    const b = buildingRect(popup.id);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    roundRect(b.x - 3, b.y - 3, b.w + 6, b.h + 6, 14); ctx.stroke();
  }

  // trucks
  for (const v of city.vehicles) {
    const { x, y } = v.pos;
    ctx.beginPath(); ctx.ellipse(x, y + 9, 13, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(45,80,30,.3)'; ctx.fill();
    ctx.font = '24px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(v.kind === 'result' ? '🚛' : v.kind === 'archive' ? '🛻' : v.kind === 'repair' ? '🚒' : '🚚', x, y + 8);
    if (v.taskId != null) {
      ctx.fillStyle = '#fff';
      roundRect(x - 17, y - 32, 34, 17, 8); ctx.fill();
      ctx.fillStyle = '#2d3436'; ctx.font = 'bold 11px sans-serif';
      ctx.fillText(`#${v.taskId}`, x, y - 20);
    }
  }
}

// ------------------------------------------------------------------ loop

function updateChrome() {
  const active = Object.values(city.tasks).filter(t => t.status !== 'delivered').length;
  badgeEl.style.display = active ? 'block' : 'none';
  badgeEl.textContent = active;
  statsEl.textContent = `📬 ${city.stats.issued}  ✅ ${city.stats.delivered}`
    + (city.stats.breakdowns ? `  💥 ${city.stats.breakdowns}` : '');
}

let last = performance.now();
let chromeTimer = 0;
function frame(now) {
  const dt = Math.min(0.1, (now - last) / 1000);
  last = now;
  if (!paused) {
    tick(city, dt * speed);
    chromeTimer += dt;
    if (chromeTimer > 0.35) {
      chromeTimer = 0;
      updateChrome();
      if (popup) renderPopup();
    }
  }
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

</script>
